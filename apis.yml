aid: barndoor
name: Barndoor
description: >-
  Barndoor AI is the control plane for agentic AI, providing secure access and governance
  for AI agents and Model Context Protocol (MCP) servers. Founded in 2024 by Oren Michels
  (founder of Mashery), Barndoor enables enterprise teams to orchestrate AI agent workflows,
  govern MCP server access, and maintain security and accountability across distributed AI
  systems. The Barndoor SDK enables developers to connect to governed MCP servers for
  platforms like Salesforce, Notion, and GitHub.
